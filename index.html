<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>طلبات فك الحظر</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Tahoma;
      background: #f5f7fa;
    }

    .header {
      background: #0b5cab;
      color: white;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      padding: 12px;
    }

    .panel {
      background: white;
      padding: 10px;
    }

    .card {
      background: #f9fbfd;
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0b5cab;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #viewDiv {
      height: 60vh;
    }
  </style>
</head>

<body>

<div class="header" id="headerTitle">طلبات فك الحظر</div>

<div class="panel">

  <div class="card">
    <b>بحث عشري</b>
    <input id="lat" placeholder="Latitude">
    <input id="lon" placeholder="Longitude">
    <button onclick="search()">بحث</button>
  </div>

  <div id="result"></div>

</div>

<div id="viewDiv"></div>

<script>

require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/Graphic"
], function(Map, MapView, FeatureLayer, Graphic) {

  const layer = new FeatureLayer({
    url: "https://services3.arcgis.com/MyuSGyE93HNIoCWs/arcgis/rest/services/Unblock18_4_2026/FeatureServer/0",
    outFields: ["*"]
  });

  const map = new Map({
    basemap: "streets",
    layers: [layer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map
  });

  view.on("click", function(event){
    view.hitTest(event).then(function(response){
      if(response.results.length > 0){
        const g = response.results[0].graphic.attributes;

        const info =
          "رقم الطلب: " + g.RequestID + "<br>" +
          "المقاول: " + g.ContractorName + "<br>" +
          "الشارع: " + g.StreetName;

        document.getElementById("result").innerHTML = info;
      }
    });
  });

  window.search = function(){
    const lat = parseFloat(document.getElementById("lat").value);
    const lon = parseFloat(document.getElementById("lon").value);

    view.goTo({
      center: [lon, lat],
      zoom: 15
    });
  };

});

// 🔥 إضافة تاريخ اليوم
(function () {
  const today = new Date();
  const d = String(today.getDate()).padStart(2, '0');
  const m = String(today.getMonth()+1).padStart(2, '0');
  const y = today.getFullYear();

  document.getElementById("headerTitle").innerHTML =
    "طلبات فك الحظر - " + d + "-" + m + "-" + y;
})();

</script>

</body>
</html>
