<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>طلبات فك الحظر</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fa;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #0b5cab;
      color: white;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 14px 10px;
    }

    .panel {
      background: white;
      padding: 12px;
      border-bottom: 1px solid #d9e2ec;
    }

    .card {
      background: #f9fbfd;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #1f2937;
    }

    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 13px;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #0b5cab;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .secondary {
      background: #64748b;
    }

    .result {
      background: #eef6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.8;
      color: #1e3a8a;
      margin-top: 10px;
      word-break: break-word;
    }

    #viewDiv {
      flex: 1;
      min-height: 55vh;
      width: 100%;
    }

    .note {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.7;
      margin-top: 8px;
    }

    @media (min-width: 900px) {
      body {
        display: grid;
        grid-template-columns: 380px 1fr;
        grid-template-rows: auto 1fr;
      }

      .header {
        grid-column: 1 / 3;
      }

      .panel {
        border-left: 1px solid #d9e2ec;
        border-bottom: none;
        overflow-y: auto;
      }

      #viewDiv {
        min-height: calc(100vh - 60px);
      }
    }
  </style>
</head>

<body>

  <div class="header" id="headerTitle">طلبات فك الحظر</div>

  <div class="panel">

    <div class="card">
      <h3>البحث العشري</h3>
      <label>Latitude</label>
      <input id="latDecimal" type="number" step="any" placeholder="24.7136" />
      <label>Longitude</label>
      <input id="lonDecimal" type="number" step="any" placeholder="46.6753" />
      <div class="btn-row">
        <button onclick="searchDecimal()">بحث</button>
        <button class="secondary" onclick="clearInputs()">مسح</button>
      </div>
    </div>

    <div class="card">
      <h3>البحث بالدرجات</h3>
      <input id="latDMS" placeholder='24°42\'49"N' />
      <input id="lonDMS" placeholder='46°40\'31"E' />
      <button onclick="searchDMS()">بحث بالدرجات</button>
    </div>

    <div class="card">
      <h3>البحث المتري UTM</h3>
      <input id="easting" placeholder="671000" />
      <input id="northing" placeholder="2734000" />
      <input id="zone" value="38" />
      <button onclick="searchUTM()">بحث بالمتري</button>
    </div>

    <div class="result" id="result">
      اضغط على أي خط داخل الخريطة أو أدخل إحداثيات للبحث.
    </div>

  </div>

  <div id="viewDiv"></div>

<script>

require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/layers/GraphicsLayer",
  "esri/Graphic",
  "esri/geometry/Point",
  "esri/geometry/SpatialReference",
  "esri/geometry/projection"
], function (Map, MapView, FeatureLayer, GraphicsLayer, Graphic, Point, SpatialReference, projection) {

  const featureLayer = new FeatureLayer({
    url: "https://services3.arcgis.com/MyuSGyE93HNIoCWs/ArcGIS/rest/services/Unblock18_4_2026/FeatureServer/0",
    outFields: ["*"],
    popupEnabled: false
  });

  const graphicsLayer = new GraphicsLayer();

  const map = new Map({
    basemap: "streets-navigation-vector",
    layers: [featureLayer, graphicsLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map
  });

  view.on("click", function(event){
    view.hitTest(event).then(function(response){
      if(response.results.length > 0){
        const a = response.results[0].graphic.attributes;

        const content =
          "<b>رقم الطلب:</b> " + a.RequestID + "<br>" +
          "<b>المقاول:</b> " + a.ContractorName + "<br>" +
          "<b>الشارع:</b> " + a.StreetName;

        document.getElementById("result").innerHTML = content;
      }
    });
  });

  window.searchDecimal = function () {
    const lat = parseFloat(document.getElementById("latDecimal").value);
    const lon = parseFloat(document.getElementById("lonDecimal").value);
    view.goTo({ center: [lon, lat], zoom: 15 });
  };

  window.searchDMS = function () {
    alert("استخدم البحث العشري أو المتري حالياً");
  };

  window.searchUTM = async function () {
    await projection.load();

    const e = parseFloat(document.getElementById("easting").value);
    const n = parseFloat(document.getElementById("northing").value);
    const z = parseInt(document.getElementById("zone").value);

    const utm = new Point({
      x: e,
      y: n,
      spatialReference: new SpatialReference({ wkid: 32600 + z })
    });

    const geo = projection.project(utm, new SpatialReference({ wkid: 4326 }));

    view.goTo({ center: [geo.x, geo.y], zoom: 15 });
  };

  window.clearInputs = function () {
    document.getElementById("latDecimal").value = "";
    document.getElementById("lonDecimal").value = "";
    document.getElementById("latDMS").value = "";
    document.getElementById("lonDMS").value = "";
    document.getElementById("easting").value = "";
    document.getElementById("northing").value = "";
  };

});

// 🔥 إضافة التاريخ تلقائي
(function () {
  const today = new Date();
  const d = String(today.getDate()).padStart(2, '0');
  const m = String(today.getMonth()+1).padStart(2, '0');
  const y = today.getFullYear();

  document.getElementById("headerTitle").innerHTML =
    "طلبات فك الحظر - " + d + "-" + m + "-" + y;
})();

</script>

</body>
</html>
